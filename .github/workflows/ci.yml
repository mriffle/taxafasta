# Continuous Integration — lint + typecheck + test + docker on push/PR (§15.1)
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[all,dev]"
      - run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[all,dev]"
      - run: pytest --cov=taxafasta --cov-report=xml --cov-report=term tests/
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image (all stages)
        run: docker build --build-arg VERSION=0.0.0 --target runtime -t taxafasta-test:latest .
      - name: Smoke test — version
        run: docker run --rm taxafasta-test:latest --version
      - name: Smoke test — help
        run: docker run --rm taxafasta-test:latest --help
      - name: Smoke test — filter
        run: |
          WORKDIR=$(mktemp -d)
          printf '>sp|P1|X OS=Org OX=7 PE=1 SV=1\nACGT\n>sp|P2|Y OS=Org OX=9606 PE=1 SV=1\nTTTT\n' > "$WORKDIR/input.fasta"
          mkdir "$WORKDIR/taxdump"
          printf '1\t|\t1\t|\tno rank\t|\n131567\t|\t1\t|\tno rank\t|\n2\t|\t131567\t|\tsuperkingdom\t|\n6\t|\t2\t|\tgenus\t|\n7\t|\t6\t|\tspecies\t|\n2759\t|\t131567\t|\tsuperkingdom\t|\n40674\t|\t2759\t|\tclass\t|\n9606\t|\t40674\t|\tspecies\t|\n' > "$WORKDIR/taxdump/nodes.dmp"
          touch "$WORKDIR/taxdump/merged.dmp"
          docker run --rm -v "$WORKDIR:/data" taxafasta-test:latest \
            -i /data/input.fasta -t 2 -o /data/out.fasta -d /data/taxdump --no-gzip
          grep -q "OX=7" "$WORKDIR/out.fasta"
          ! grep -q "OX=9606" "$WORKDIR/out.fasta"
          test -f "$WORKDIR/out.fasta.log"
          echo "Docker smoke tests passed"
